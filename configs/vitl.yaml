# Benchmark config - ViT-L default deployable encoder (D2).
# Matches vjepa_edge.config.BenchmarkConfig; load with config.load_config().
model:
  checkpoint: vitl
  frames: 16
  resolution: 256
  device: cuda
  dtype: float16
  freeze: true
quant:
  scheme: none
  method: ptq
  targets:
    - attn
    - mlp
  exclude:
    - norm
    - act
    - embed
  calib_samples: 256
  per_channel: true
tokens:
  method: none
  r: 0
  apply_layers: []
  temporal_static_merge: false
  threshold: 0.9
batch: 1
warmup: 10
iters: 50
device: cuda
precision: fp16
out_path: benchmarks/results/vitl.json
tag: vitl-fp16-baseline
